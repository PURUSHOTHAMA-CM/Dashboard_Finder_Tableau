<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Selector</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; }
        #chat { width: 30%; padding: 10px; border-right: 1px solid #ccc; }
        #dashboard { width: 70%; }
        #chatBox{
            height:300px;
            overflow-y:auto ;
            box-shadow: 0 0 12px rgb(37, 48, 106);
        }
        iframe { width: 100%; height: 100%; border: none; }
        input{
            width: 70%;
            padding-top: 10px;
            margin-top: 10px;
        }
        button{
            width:20%;
            margin:0;
            background-color: rgba(33, 33, 248, 0.741);
            color: aliceblue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="chat">
    <div id="chatBox"></div>
    <input id="input" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
</div>

<div id="dashboard">
    <iframe id="frame"></iframe>
</div>

<script src="metadata.js"></script>
<script src="script.js"></script>
</body>
</html>
